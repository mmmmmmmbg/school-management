<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل معلم</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-chalkboard-teacher"></i> پنل معلم</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" data-section="createExam" class="active"><i class="fas fa-plus-circle"></i> ایجاد آزمون</a></li>
                <li><a href="#" data-section="viewExams"><i class="fas fa-list"></i> آزمون‌های من</a></li>
                <li><a href="#" data-section="library"><i class="fas fa-book"></i> کتابخانه</a></li>
                <li><a href="#" onclick="Utils.logout()"><i class="fas fa-sign-out-alt"></i> خروج</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">پنل معلم</h1>
                <span id="teacherName"></span>
            </div>

            <!-- ایجاد آزمون -->
            <section id="createExam" class="section">
                <div class="card">
                    <div class="card-header"><h3>ایجاد آزمون با هوش مصنوعی</h3></div>
                    <div class="form-group">
                        <label>آپلود PDF کتاب</label>
                        <input type="file" id="pdfUpload" accept=".pdf">
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label>تعداد سوال</label>
                            <input type="number" id="questionCount" value="5" min="1" max="20">
                        </div>
                        <div class="form-group">
                            <label>نوع سوال</label>
                            <select id="questionType">
                                <option value="چهارگزینه‌ای">چهارگزینه‌ای</option>
                                <option value="تشریحی">تشریحی</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>فصل</label>
                            <input type="text" id="chapter" placeholder="مثلاً فصل ۳">
                        </div>
                        <div class="form-group">
                            <label>درجه سختی</label>
                            <select id="difficulty">
                                <option value="آسان">آسان</option>
                                <option value="متوسط">متوسط</option>
                                <option value="سخت">سخت</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="generateExam">تولید آزمون</button>
                    
                    <div id="generatedQuestions" class="hidden mt-3"></div>
                    
                    <div class="mt-3 hidden" id="sendSection">
                        <div class="grid grid-2">
                            <div class="form-group">
                                <label>ارسال به</label>
                                <select id="sendTo">
                                    <option value="all">همه دانش‌آموزان</option>
                                    <option value="class">یک کلاس</option>
                                    <option value="selected">دانش‌آموزان انتخابی</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>کلاس</label>
                                <select id="classSelect">
                                    <option value="دهم ریاضی">دهم ریاضی</option>
                                    <option value="دهم تجربی">دهم تجربی</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn btn-success mt-2" id="sendExam">ارسال آزمون</button>
                    </div>
                </div>
            </section>

            <!-- مشاهده آزمون‌ها -->
            <section id="viewExams" class="section hidden">
                <div class="card">
                    <div class="card-header"><h3>آزمون‌های ساخته شده</h3></div>
                    <table>
                        <thead><tr><th>عنوان</th><th>تعداد سوال</th><th>تاریخ</th><th>عملیات</th></tr></thead>
                        <tbody id="teacherExamsBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- کتابخانه -->
            <section id="library" class="section hidden">
                <div class="card">
                    <div class="card-header"><h3>ثبت کتاب جدید</h3></div>
                    <div class="form-group">
                        <label>عنوان کتاب</label>
                        <input type="text" id="bookTitle">
                    </div>
                    <div class="form-group">
                        <label>نویسنده</label>
                        <input type="text" id="bookAuthor">
                    </div>
                    <div class="form-group">
                        <label>فایل PDF</label>
                        <input type="file" id="bookFile" accept=".pdf">
                    </div>
                    <button class="btn btn-primary" onclick="TeacherPanel.addBook()">ثبت کتاب</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/teacher.js"></script>
    <script>
        // متد اضافه کردن کتاب (برای سادگی در teacher.js کامل می‌شود)
        TeacherPanel.addBook = function() {
            const title = document.getElementById('bookTitle').value;
            const author = document.getElementById('bookAuthor').value;
            const fileInput = document.getElementById('bookFile');
            
            if (!title || !author) {
                Utils.showToast('عنوان و نویسنده الزامی است', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const books = Utils.getFromLocal('books') || [];
                books.push({
                    id: Utils.generateId(),
                    title: title,
                    author: author,
                    fileData: e.target.result,
                    uploadedBy: Utils.checkSession().userId,
                    date: new Date().toISOString()
                });
                Utils.saveToLocal('books', books);
                Utils.showToast('کتاب با موفقیت ثبت شد', 'success');
            };
            
            if (fileInput.files[0]) {
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                Utils.showToast('فایل PDF الزامی است', 'error');
            }
        };
    </script>
</body>
</html>
